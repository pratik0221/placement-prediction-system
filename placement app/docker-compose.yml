# docker-compose.yml
# Run:  docker compose up -d
# Then: python app.py

version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: placement_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: placement_db
    ports:
      - "3310:3306"
    volumes:
      - placement_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql   # auto-runs on first start

volumes:
  placement_data:
