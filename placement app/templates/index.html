<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered Student Placement Prediction System. Enter your academic details to predict placement chances.">
    <title>Placement Predictor | Home</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ── Navigation ─────────────────────────────────────────── -->
<nav class="navbar">
    <div class="nav-brand">
        <span class="nav-icon">🎓</span>
        <span>PlacementAI</span>
    </div>
    <div class="nav-links">
        <a href="/" class="nav-link active" id="nav-home">🏠 Home</a>
        <a href="/dashboard" class="nav-link" id="nav-dashboard">📊 Dashboard</a>
    </div>
</nav>

<!-- ── Main Form ───────────────────────────────────────────── -->
<div class="page-wrapper">
<div class="container">

    <div class="form-header">
        <h1>Student Placement Prediction</h1>
        <p class="subtitle">Fill in your academic profile and our AI model will predict your placement chances instantly.</p>
    </div>

    <form action="/predict" method="post" id="predictionForm">

        <!-- Row 1: Name & Class -->
        <div class="form-row">
            <div class="form-group">
                <label for="student_name">Student Name</label>
                <input type="text" id="student_name" name="student_name" placeholder="e.g. Priya Sharma" required>
            </div>
            <div class="form-group">
                <label for="student_class">Class / Year</label>
                <select id="student_class" name="student_class" required>
                    <option value="" disabled selected>Select class</option>
                    <option value="FY">FY – First Year</option>
                    <option value="SY">SY – Second Year</option>
                    <option value="TY">TY – Third Year</option>
                    <option value="Final Year">Final Year</option>
                    <option value="B.Tech">B.Tech Graduate</option>
                    <option value="BCA">BCA Graduate</option>
                    <option value="MCA">MCA Graduate</option>
                    <option value="B.Sc">B.Sc Graduate</option>
                </select>
            </div>
        </div>

        <!-- Row 2: CGPA & Backlogs -->
        <div class="form-row">
            <div class="form-group">
                <label for="CGPA">CGPA (0 – 10)</label>
                <input type="number" id="CGPA" name="CGPA" step="0.1" min="0" max="10" placeholder="e.g. 7.8" required>
            </div>
            <div class="form-group">
                <label for="Backlogs">Backlogs</label>
                <input type="number" id="Backlogs" name="Backlogs" min="0" placeholder="e.g. 0" required>
            </div>
        </div>

        <!-- Row 3: Internships & Projects -->
        <div class="form-row">
            <div class="form-group">
                <label for="Internships">Internships Completed</label>
                <input type="number" id="Internships" name="Internships" min="0" placeholder="e.g. 2" required>
            </div>
            <div class="form-group">
                <label for="Projects">Projects Completed</label>
                <input type="number" id="Projects" name="Projects" min="0" placeholder="e.g. 3" required>
            </div>
        </div>

        <!-- Row 4: Skills -->
        <div class="form-row">
            <div class="form-group">
                <label for="Coding_Skills">Coding Skills (1 – 10)</label>
                <input type="number" id="Coding_Skills" name="Coding_Skills" min="1" max="10" placeholder="e.g. 8" required>
            </div>
            <div class="form-group">
                <label for="Communication_Skills">Communication Skills (1 – 10)</label>
                <input type="number" id="Communication_Skills" name="Communication_Skills" min="1" max="10" placeholder="e.g. 7" required>
            </div>
        </div>

        <!-- Row 5: Aptitude -->
        <div class="form-row">
            <div class="form-group">
                <label for="Aptitude_Test_Score">Aptitude Score (0 – 100)</label>
                <input type="number" id="Aptitude_Test_Score" name="Aptitude_Test_Score" min="0" max="100" placeholder="e.g. 75" required>
            </div>
        </div>

        <!-- Row 6: Gender & Degree -->
        <div class="form-row">
            <div class="form-group">
                <label for="Gender">Gender</label>
                <select id="Gender" name="Gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label for="Degree">Degree</label>
                <select id="Degree" name="Degree">
                    <option value="B.Tech">B.Tech</option>
                    <option value="BCA">BCA</option>
                    <option value="MCA">MCA</option>
                    <option value="B.Sc">B.Sc</option>
                </select>
            </div>
        </div>

        <button type="submit" id="submitBtn">
            <span class="btn-text">⚡ Predict Placement</span>
            <span class="btn-loader" style="display:none">Analysing…</span>
        </button>

    </form>

</div>
</div>

<script>
    document.getElementById('predictionForm').addEventListener('submit', function () {
        document.querySelector('.btn-text').style.display  = 'none';
        document.querySelector('.btn-loader').style.display = 'inline';
        document.getElementById('submitBtn').disabled = true;
    });
</script>

</body>
</html>
