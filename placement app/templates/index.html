<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placement Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h2> Student Placement Prediction</h2>

    <form action="/predict" method="post">

        <div class="form-group">
            <label>CGPA</label>
            <input type="number" step="0.1" name="CGPA" required>
        </div>

        <div class="form-group">
            <label>Internships</label>
            <input type="number" name="Internships" required>
        </div>

        <div class="form-group">
            <label>Projects</label>
            <input type="number" name="Projects" required>
        </div>

        <div class="form-group">
            <label>Coding Skills (1–10)</label>
            <input type="number" name="Coding_Skills" min="1" max="10" required>
        </div>

        <div class="form-group">
            <label>Communication Skills (1–10)</label>
            <input type="number" name="Communication_Skills" min="1" max="10" required>
        </div>

        <div class="form-group">
            <label>Aptitude Score</label>
            <input type="number" name="Aptitude_Test_Score" required>
        </div>

        <div class="form-group">
            <label>Backlogs</label>
            <input type="number" name="Backlogs" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <select name="Gender">
                <option>Male</option>
                <option>Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Degree</label>
            <select name="Degree">
                <option>B.Tech</option>
                <option>BCA</option>
                <option>MCA</option>
                <option>B.Sc</option>
            </select>
        </div>

        <button type="submit"> Predict Placement</button>

    </form>

</div>

</body>
</html>
