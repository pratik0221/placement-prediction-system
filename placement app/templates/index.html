<!DOCTYPE html>
<html>
<head>
    <title>Placement Prediction</title>
</head>
<body>

<h2>Placement Prediction System</h2>

<form action="/predict" method="post">

<input type="number" name="Age" placeholder="Age" required><br><br>
<input type="number" name="Gender" placeholder="Gender (0/1)" required><br><br>
<input type="number" name="Degree" placeholder="Degree" required><br><br>
<input type="number" step="0.1" name="CGPA" placeholder="CGPA" required><br><br>
<input type="number" name="Internships" placeholder="Internships" required><br><br>
<input type="number" name="Projects" placeholder="Projects" required><br><br>
<input type="number" name="Coding_Skills" placeholder="Coding Skills" required><br><br>
<input type="number" name="Communication_Skills" placeholder="Communication Skills" required><br><br>
<input type="number" name="Aptitude_Test_Score" placeholder="Aptitude Score" required><br><br>
<input type="number" name="Backlogs" placeholder="Backlogs" required><br><br>

<button type="submit">Predict</button>

</form>

<h3>{{ prediction_text }}</h3>

<ul>
{% for rec in recommendations %}
    <li>{{ rec }}</li>
{% endfor %}
</ul>

</body>
</html>
